
services:
  db:
    image: postgres:16-alpine
    container_name: stf_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aisocialfeed}
      POSTGRES_USER: ${POSTGRES_USER:-stfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stfuser} -d ${POSTGRES_DB:-aisocialfeed}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stf_net

  redis:
    image: redis:7-alpine
    container_name: stf_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stf_net

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stf_bot
    restart: unless-stopped
    stop_grace_period: 30s
    command: python -m bot.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
      - ./translations:/app/translations
    # v3.2: Docker monitors bot health every 5 min
    healthcheck:
      test: ["CMD", "python", "-c",
             "import redis, os; r=redis.from_url(os.environ['REDIS_URL']); r.ping()"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - stf_net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stf_worker
    restart: unless-stopped
    stop_grace_period: 60s
    command: celery -A worker.tasks worker --loglevel=info --concurrency=6 -Q default,ai,downloads
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
    networks:
      - stf_net

  worker_platforms:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stf_worker_platforms
    restart: unless-stopped
    stop_grace_period: 60s
    # Dedicated worker for feed fetching — max 4 concurrent RSSHub requests
    command: celery -A worker.tasks worker --loglevel=info --concurrency=4 -Q platforms
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
    networks:
      - stf_net

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stf_beat
    restart: unless-stopped
    command: celery -A worker.tasks beat --loglevel=info -s /celery/celerybeat-schedule
    volumes:
      - celery_beat_data:/celery
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stf_net

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stf_admin
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head || echo 'Alembic warning: continuing anyway, bot will use create_all' &&
             python manage.py migrate --noinput &&
             python manage.py seed_plans --noinput 2>/dev/null || true &&
             python manage.py collectstatic --noinput &&
             gunicorn admin.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static
      - ./media:/app/media
      - ./logs:/app/logs
    # SEC-5 fix: bind to 127.0.0.1 only — admin panel is never reachable directly
    # from the internet. Route through nginx with TLS on the host:
    #   location /admin { proxy_pass http://127.0.0.1:8000; }
    # Remove this ports block entirely if nginx runs as a container in stf_net.
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8000}:8000"
    networks:
      - stf_net

  backup:
    image: postgres:16-alpine
    container_name: stf_backup
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aisocialfeed}
      POSTGRES_USER: ${POSTGRES_USER:-stfuser}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./docker/backup.sh:/backup.sh
    command: >
      sh -c "chmod +x /backup.sh &&
        echo '0 3 * * * /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stf_net


  rsshub:
    image: diygod/rsshub:latest
    container_name: stf_rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      CACHE_EXPIRE: 600          # 10 min cache (was 5 min) - reduces RSSHub outbound requests by ~50%
      CACHE_CONTENT_EXPIRE: 3600
      TWITTER_COOKIE: ${RSSHUB_COOKIE_TWITTER}
      IG_COOKIE: ${RSSHUB_COOKIE_INSTAGRAM}
      TIKTOK_COOKIE: ${RSSHUB_COOKIE_TIKTOK}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stf_net
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}


volumes:
  postgres_data:
  redis_data:
  celery_beat_data:

networks:
  stf_net:
    driver: bridge